name: Archive Scraper (Manual Only)

on:
  workflow_dispatch:        # only manual trigger — never scheduled

jobs:
  archive:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      CAPTCHA_API_KEY:      ${{ secrets.TWOCAPTCHA_API_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Google Chrome
        run: sudo apt-get install -y google-chrome-stable

      - name: Run archive scraper
        run: python scrapers/archive_scraper.py

      - name: Notify on failure
        if: failure()
        run: |
          echo "=========================================="
          echo "ARCHIVE SCRAPER FAILED at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Workflow: $GITHUB_WORKFLOW"
          echo "Run ID:   $GITHUB_RUN_ID"
          echo "Logs:     $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          echo "=========================================="
